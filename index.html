<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shop</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            font-family: Arial, sans-serif;
            color: #222;
        }

        .mant-card {
            background: #fff;
            width: 90%;
            max-width: 430px;
            padding: 44px 32px 36px;
            border-radius: 22px;
            text-align: center;
            box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.12);
        }

        .mant-icon {
            font-size: 48px;
            margin-bottom: 18px;
            display: block;
        }

        .mant-card h2 {
            color: #111;
            font-size: 22px;
            font-weight: 800;
            margin: 0 0 14px;
            letter-spacing: -0.4px;
        }

        .mant-card p {
            color: #555;
            font-size: 15px;
            line-height: 1.65;
            margin: 0 0 28px;
        }

        .mant-card p b {
            color: #111;
            font-weight: 700;
        }

        .btn-mant-entendido {
            background: #111;
            color: #adff2f;
            border: none;
            padding: 15px 0;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            transition: background 0.25s, transform 0.2s, box-shadow 0.2s;
        }

        .btn-mant-entendido:hover {
            background: #222;
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.22);
        }
    </style>
</head>
<body>
    <div class="mant-card">
        <span class="mant-icon">🔧</span>
        <h2>Sitio temporalmente fuera de servicio</h2>
        <p>
            Por el momento, esta página no se encuentra disponible.<br>
            Vuelve a intentarlo en unos momentos.<br><br>
            <b>Gracias por tu paciencia</b>
        </p>
        <button class="btn-mant-entendido" onclick="window.open('', '_self'); window.close();">
            Entendido
        </button>
    </div>
</body>
</html>
